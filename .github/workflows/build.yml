name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
        run: yes | buildozer android debug || buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: doorlock-apk
          path: bin/*.apk
