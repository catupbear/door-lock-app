name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git unzip ccache \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Setup Android SDK
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest

          SDKMANAGER=$SDK/cmdline-tools/latest/bin/sdkmanager

          # 为 buildozer 旧路径创建兼容链接
          mkdir -p $SDK/tools/bin
          ln -sf $SDKMANAGER $SDK/tools/bin/sdkmanager

          # 接受许可
          yes | $SDKMANAGER --sdk_root=$SDK --licenses

          # 安装所需组件
          $SDKMANAGER --sdk_root=$SDK \
            "build-tools;37.0.0" \
            "platforms;android-29" \
            "platform-tools"

          # 预写许可文件
          mkdir -p $SDK/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $SDK/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: doorlock-apk
          path: bin/*.apk
