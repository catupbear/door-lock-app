name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libbz2-dev libsqlite3-dev libreadline-dev liblzma-dev \
            build-essential ccache

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Pin pip to avoid resolvelib bug
        run: echo "pip<25" > /tmp/pip-constraints.txt

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          PIP_CONSTRAINT: '/tmp/pip-constraints.txt'
        run: yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: doorlock-apk
          path: bin/*.apk
