name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libbz2-dev libsqlite3-dev libreadline-dev liblzma-dev \
            build-essential ccache patchelf automake \
            libltdl-dev

      - name: Install buildozer and cython
        run: pip install buildozer "cython<3"

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Pin pip and cython versions
        run: printf 'pip<25\ncython<3\n' > /tmp/pip-constraints.txt

      - name: Ensure Android SDK components are available
        run: |
          SDKMANAGER=/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER --licenses || true
          # p4a 查找 sdkmanager 的老路径，建软链接
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf $SDKMANAGER /usr/local/lib/android/sdk/tools/bin/sdkmanager
          # 确保 NDK 存在
          if [ ! -d "/usr/local/lib/android/sdk/ndk/27.2.12479018" ]; then
            $SDKMANAGER "ndk;27.2.12479018"
          fi
          # 确保 build-tools 存在
          if [ ! -d "/usr/local/lib/android/sdk/build-tools" ] || \
             [ -z "$(ls /usr/local/lib/android/sdk/build-tools 2>/dev/null)" ]; then
            $SDKMANAGER "build-tools;34.0.0"
          fi
          # 确保 android-29 platform 存在（p4a 编译需要）
          if [ ! -d "/usr/local/lib/android/sdk/platforms/android-29" ]; then
            $SDKMANAGER "platforms;android-29"
          fi
          # Verify paths
          ls /usr/local/lib/android/sdk/ndk/27.2.12479018/ndk-build
          ls /usr/local/lib/android/sdk/build-tools/
          ls /usr/local/lib/android/sdk/tools/bin/sdkmanager
          ls /usr/local/lib/android/sdk/platforms/android-29/

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          PIP_CONSTRAINT: '/tmp/pip-constraints.txt'
          JAVA_HOME: '/usr/lib/jvm/temurin-17-jdk-amd64'
          ANDROIDSDK: '/usr/local/lib/android/sdk'
          ANDROIDNDK: '/usr/local/lib/android/sdk/ndk/27.2.12479018'
          ANDROIDAPI: '29'
          ANDROIDMINAPI: '21'
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: doorlock-apk
          path: bin/*.apk

      - name: Show last 150 lines of build log on failure
        if: failure()
        run: tail -150 build.log || true

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
