name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libbz2-dev libsqlite3-dev libreadline-dev liblzma-dev \
            build-essential ccache patchelf automake \
            libltdl-dev

      - name: Install buildozer and cython
        run: pip install buildozer "cython<3"

      - name: Cache buildozer directory
        uses: actions/cache@v4.2.3
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Pin pip and cython versions
        run: printf 'pip<25\ncython<3\n' > /tmp/pip-constraints.txt

      - name: Setup Android SDK for buildozer
        run: |
          SDK=/usr/local/lib/android/sdk
          SDKMANAGER=$SDK/cmdline-tools/latest/bin/sdkmanager
          # 接受所有许可证
          yes | $SDKMANAGER --licenses || true
          # buildozer 默认在 ~/.buildozer/android/platform/android-sdk 找 SDK
          # 用软链接指向预装 SDK，省去重新下载
          mkdir -p ~/.buildozer/android/platform
          ln -sf $SDK ~/.buildozer/android/platform/android-sdk
          # p4a 用老路径找 sdkmanager，建软链接
          sudo mkdir -p $SDK/tools/bin
          sudo ln -sf $SDKMANAGER $SDK/tools/bin/sdkmanager
          # 确保需要的组件存在
          [ ! -d "$SDK/ndk/25.2.9519653" ] && $SDKMANAGER "ndk;25.2.9519653" || true
          [ ! -d "$SDK/platforms/android-29" ] && $SDKMANAGER "platforms;android-29" || true
          [ ! -d "$SDK/platforms/android-31" ] && $SDKMANAGER "platforms;android-31" || true
          [ -z "$(ls $SDK/build-tools 2>/dev/null)" ] && $SDKMANAGER "build-tools;34.0.0" || true
          # 验证关键路径
          ls $SDK/ndk/25.2.9519653/ndk-build
          ls $SDK/platforms/android-29/
          ls $SDK/build-tools/

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          PIP_CONSTRAINT: '/tmp/pip-constraints.txt'
          JAVA_HOME: '/usr/lib/jvm/temurin-17-jdk-amd64'
          ANDROIDSDK: '/usr/local/lib/android/sdk'
          ANDROIDNDK: '/usr/local/lib/android/sdk/ndk/25.2.9519653'
          ANDROIDAPI: '31'
          ANDROIDMINAPI: '21'
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: doorlock-apk
          path: bin/*.apk

      - name: Push APK to server
        if: success() && env.UPLOAD_TOKEN != ''
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: |
          APK=$(ls bin/*.apk | head -1)
          curl -f --max-time 60 \
            -F "file=@${APK}" \
            -H "X-Token: ${UPLOAD_TOKEN}" \
            "${SERVER_URL}/api/admin/upload-apk"

      - name: Show last 150 lines of build log on failure
        if: failure()
        run: tail -150 build.log || true

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build.log
