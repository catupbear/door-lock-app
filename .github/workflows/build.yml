name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git unzip ccache \
            openjdk-17-jdk autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Setup Android SDK and accept licenses
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          SDKMANAGER=$SDK/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER --sdk_root=$SDK --licenses
          $SDKMANAGER --sdk_root=$SDK "build-tools;37.0.0" "platforms;android-29" "platform-tools"

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: doorlock-apk
          path: bin/*.apk
